<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#5468ee" />
    <title>Offline · MeetHub</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --fg: #0a0a0a;
        --muted: #6b7280;
        --brand: #5468ee;
        --card: rgba(0, 0, 0, 0.03);
        --border: rgba(0, 0, 0, 0.08);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0a0a0a;
          --fg: #fafafa;
          --muted: #9ca3af;
          --card: rgba(255, 255, 255, 0.04);
          --border: rgba(255, 255, 255, 0.1);
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        background: var(--bg);
        color: var(--fg);
        font-family:
          system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        text-align: center;
      }
      .card {
        max-width: 22rem;
        width: 100%;
      }
      .logo {
        width: 72px;
        height: 72px;
        margin: 0 auto 1.5rem;
      }
      h1 {
        font-size: 1.5rem;
        margin: 0 0 0.5rem;
        font-weight: 650;
      }
      p {
        color: var(--muted);
        line-height: 1.5;
        margin: 0 0 1.75rem;
      }
      button {
        appearance: none;
        border: 0;
        cursor: pointer;
        background: var(--brand);
        color: #fff;
        font: inherit;
        font-weight: 600;
        padding: 0.7rem 1.5rem;
        border-radius: 0.75rem;
        transition: opacity 0.15s ease;
      }
      button:active {
        opacity: 0.8;
      }
      .hint {
        margin-top: 1.25rem;
        font-size: 0.8rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <svg class="logo" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <linearGradient id="g" x1="6" y1="4" x2="34" y2="36" gradientUnits="userSpaceOnUse">
            <stop stop-color="#8B7CF6" />
            <stop offset="1" stop-color="#5468EE" />
          </linearGradient>
        </defs>
        <polygon points="20,3 34.6,11.5 34.6,28.5 20,37 5.4,28.5 5.4,11.5" fill="url(#g)" stroke="url(#g)" stroke-width="2.5" stroke-linejoin="round" />
        <polyline points="12.5,27 12.5,14 20,21.5 27.5,14 27.5,27" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
        <circle cx="20" cy="25.5" r="2.3" fill="#FB7185" />
      </svg>
      <h1>You're offline</h1>
      <p>
        MeetHub needs an internet connection. Check your network and try again —
        recently visited pages may still open.
      </p>
      <button type="button" onclick="location.reload()">Try again</button>
      <div class="hint">Siz oflayn rejimdasiz · Вы не в сети</div>
    </div>
  </body>
</html>
